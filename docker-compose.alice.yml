services:
  openclaw-gateway:
    build: .
    user: root
    environment:
      HOME: /root
      TERM: xterm-256color
      GROQ_API_KEY: ${GROQ_API_KEY}
      TZ: Asia/Nicosia
    volumes:
      - /Users/kuznetsov/.openclaw:/root/.openclaw
    ports:
      - "18789:18789"
    init: true
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "apt-get update -qq && apt-get install -y -qq ffmpeg >/dev/null 2>&1; python3 -m pip install --break-system-packages -q telethon rlottie-python 2>/dev/null; exec node dist/index.js gateway --bind loopback --port 18789"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
